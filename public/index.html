<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBD2 Data Logger</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="live-dot" id="live-dot" title="Live status"></span>
      <h1>OBD2 Data Logger</h1>
    </div>
    <nav class="tabs">
      <button class="tab active" data-tab="live">Live</button>
      <button class="tab" data-tab="trips">Trips</button>
      <button class="tab" data-tab="stats">Stats</button>
    </nav>
    <button id="logout-btn" class="btn-ghost" title="Sign out">Logout</button>
  </header>

  <main class="content">
    <!-- LIVE -->
    <section id="tab-live" class="tab-panel active">
      <div class="live-hero">
        <div class="hero-metric">
          <div class="hero-value" id="live-speed">--</div>
          <div class="hero-unit">km/h</div>
        </div>
        <div class="hero-metric">
          <div class="hero-value" id="live-rpm">--</div>
          <div class="hero-unit">rpm</div>
        </div>
      </div>
      <div class="live-status" id="live-status">Waiting for data…</div>
      <div class="card-grid" id="live-cards"></div>
    </section>

    <!-- TRIPS -->
    <section id="tab-trips" class="tab-panel">
      <div id="trips-list-view">
        <h2>Trips</h2>
        <div class="table-wrap">
          <table class="trips-table">
            <thead>
              <tr>
                <th>Date</th><th>Start</th><th>Duration</th><th>Distance</th>
                <th>Avg Speed</th><th>Max Speed</th><th>Avg RPM</th><th>Readings</th>
              </tr>
            </thead>
            <tbody id="trips-tbody"></tbody>
          </table>
        </div>
        <div id="trips-empty" class="empty-msg" hidden>No trips recorded yet.</div>
      </div>

      <div id="trip-detail-view" hidden>
        <button class="btn-ghost" id="trip-back">← Back to trips</button>
        <h2 id="trip-detail-title">Trip detail</h2>
        <div class="field-picker" id="field-picker"></div>
        <div class="chart-box"><canvas id="trip-chart"></canvas></div>
        <div class="card-grid" id="trip-summary"></div>
      </div>
    </section>

    <!-- STATS -->
    <section id="tab-stats" class="tab-panel">
      <h2>Overall Stats</h2>
      <div class="card-grid" id="stats-cards"></div>
      <div class="chart-box"><canvas id="stats-speed-chart"></canvas></div>
      <div class="chart-box"><canvas id="stats-fuel-chart"></canvas></div>
    </section>
  </main>

  <script src="/js/chartConfig.js"></script>
  <script src="/js/liveView.js"></script>
  <script src="/js/tripsView.js"></script>
  <script src="/js/statsView.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
